<!DOCTYPE html>
<html>
<head>
    <title>Nap Guard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1 class="app-title">
    <span class="main-title">NAP</span><br>
    <span class="sub-title">GUARD</span>
</h1>
    
    <div class="card">

        <h3>Enter Your Destination</h3>
        <input type="text" id="placeName" placeholder="Enter city or place">
        <button onclick="getCoordinates()">Find Location</button>

        <h3>Alert Radius (meters)</h3>
        <input type="number" id="radius" placeholder="Enter radius (e.g. 500)">

        <div class="buttons">
            <button onclick="startSimulation()">Start</button>
            <button onclick="stopSimulation()">Stop Alarm</button>
        </div>

       

        <h3>Status</h3>
        <p id="status">Not started</p>
        
    </div>

    <audio id="alarmSound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
